<!doctype html>
<html lang="zh-CN">
  <head>

    <link rel="stylesheet" href="./podSuiteTool.css" />
    <script src="./themeSync.js" defer></script>
    <script src="./podSuiteTemplateRegions.js" defer></script>
    <script src="./podSuiteTool.js" defer></script>
  </head>
  <body>
    <main class="pod-suite-shell">
      <header class="pod-suite-header">
        <div class="pod-suite-heading">
          <p class="pod-suite-eyebrow">POD</p>
          <h1>POD&#x5957;&#x56FE;&#x5DE5;&#x5177;</h1>
        </div>
        <div class="pod-suite-header-side">
          <nav class="pod-suite-mode-tabs" aria-label="POD&#x5957;&#x56FE;&#x529F;&#x80FD;">
            <button class="pod-suite-mode-tab is-active" type="button" data-pod-suite-mode="white-mockup">
              &#x767D;&#x819C;&#x5957;&#x56FE;
            </button>
            <button class="pod-suite-mode-tab" type="button" data-pod-suite-mode="psd-smart-object">
              PSD&#x667A;&#x80FD;&#x5957;&#x56FE;
            </button>
          </nav>
          <div class="pod-suite-status" id="podSuiteStatus">&#x5F85;&#x9009;&#x62E9;&#x767D;&#x819C;</div>
        </div>
      </header>

      <section class="pod-suite-mode-page is-active" data-pod-suite-page="white-mockup">

        <aside class="pod-suite-sidebar">
          <section class="pod-suite-panel">
            <div class="pod-suite-panel-head">
              <h2>&#x6587;&#x4EF6;</h2>
            </div>
            <div class="pod-suite-field-stack">
              <label class="pod-suite-field">
                <span>&#x767D;&#x819C;&#x56FE;&#x7247;</span>
                <div class="pod-suite-picker-row">
                  <input id="podSuiteWhiteMockupPath" type="text" readonly />
                  <button id="podSuiteSelectWhiteMockupButton" class="pod-suite-secondary-button" type="button">
                    &#x9009;&#x62E9;
                  </button>
                </div>
              </label>

              <label class="pod-suite-field">
                <span>&#x5370;&#x82B1;&#x8499;&#x7248;&#x56FE;</span>
                <div class="pod-suite-picker-row pod-suite-picker-row-with-clear">
                  <input id="podSuiteMaskImagePath" type="text" readonly />
                  <button id="podSuiteSelectMaskImageButton" class="pod-suite-secondary-button" type="button">
                    &#x9009;&#x62E9;
                  </button>
                  <button id="podSuiteClearMaskImageButton" class="pod-suite-secondary-button" type="button">
                    &#x6E05;&#x7A7A;
                  </button>
                </div>
              </label>

              <label class="pod-suite-field">
                <span>&#x7EB9;&#x7406;/&#x906E;&#x6321;&#x56FE;</span>
                <div class="pod-suite-picker-row pod-suite-picker-row-with-clear">
                  <input id="podSuiteTextureImagePath" type="text" readonly />
                  <button id="podSuiteSelectTextureImageButton" class="pod-suite-secondary-button" type="button">
                    &#x9009;&#x62E9;
                  </button>
                  <button id="podSuiteClearTextureImageButton" class="pod-suite-secondary-button" type="button">
                    &#x6E05;&#x7A7A;
                  </button>
                </div>
              </label>

              <label class="pod-suite-field">
                <span>&#x56FE;&#x7247;&#x6587;&#x4EF6;&#x5939;</span>
                <div class="pod-suite-picker-row">
                  <input id="podSuiteImageDirectoryPath" type="text" readonly />
                  <button id="podSuiteSelectImageDirectoryButton" class="pod-suite-secondary-button" type="button">
                    &#x9009;&#x62E9;
                  </button>
                </div>
              </label>

              <label class="pod-suite-field">
                <span>&#x5BFC;&#x51FA;&#x76EE;&#x5F55;</span>
                <div class="pod-suite-picker-row">
                  <input id="podSuiteOutputDirectoryPath" type="text" readonly />
                  <button id="podSuiteSelectOutputDirectoryButton" class="pod-suite-secondary-button" type="button">
                    &#x9009;&#x62E9;
                  </button>
                </div>
              </label>
            </div>
          </section>

          <section class="pod-suite-panel">
            <div class="pod-suite-panel-head">
              <h2>&#x5BFC;&#x51FA;</h2>
            </div>
            <div class="pod-suite-field-stack">
              <div class="pod-suite-two-columns">
                <label class="pod-suite-field">
                  <span>&#x683C;&#x5F0F;</span>
                  <select id="podSuiteOutputFormat">
                    <option value="jpg">JPG</option>
                    <option value="png">PNG</option>
                  </select>
                </label>

                <label class="pod-suite-field">
                  <span>JPG &#x8D28;&#x91CF;</span>
                  <input id="podSuiteJpegQuality" type="number" min="60" max="100" value="92" />
                </label>
              </div>

              <button id="podSuiteGenerateButton" class="pod-suite-primary-button" type="button" disabled>
                &#x5F00;&#x59CB;&#x5957;&#x56FE;
              </button>
            </div>
          </section>
        </aside>

        <section class="pod-suite-main">
          <section class="pod-suite-panel">
            <div class="pod-suite-panel-head">
              <h2 id="podSuiteTargetPanelTitle">&#x767D;&#x819C;&#x6A21;&#x677F;</h2>
            </div>

            </div>
          </section>

          <section class="pod-suite-panel">
            <div class="pod-suite-panel-head">
              <h2>&#x8BC6;&#x522B;&#x4FE1;&#x606F;</h2>
            </div>
            <div class="pod-suite-metric-grid">
              <div class="pod-suite-metric">
                <span id="podSuiteBaseMetricLabel">&#x767D;&#x819C;</span>
                <strong id="podSuiteBaseMetric">-</strong>
              </div>
              <div class="pod-suite-metric">
                <span id="podSuiteTargetMetricLabel">&#x6A21;&#x677F;</span>
                <strong id="podSuiteTemplateMetric">0</strong>
              </div>
              <div class="pod-suite-metric">
                <span>&#x5F85;&#x5957;&#x56FE;</span>
                <strong id="podSuiteImageMetric">0</strong>
              </div>
              <div class="pod-suite-metric">
                <span>&#x5BFC;&#x51FA;&#x533A;&#x57DF;</span>
                <strong id="podSuiteRegionMetric">0</strong>
              </div>
            </div>
          </section>

          <section class="pod-suite-panel pod-suite-log-panel">
            <div class="pod-suite-panel-head">
              <h2>&#x6267;&#x884C;&#x8BB0;&#x5F55;</h2>
            </div>
            <div id="podSuiteLog" class="pod-suite-log"></div>
          </section>
        </section>
      </section>
      </section>

      <section class="pod-suite-mode-page" data-pod-suite-page="psd-smart-object" hidden>
        <section class="pod-suite-psd-shell">
          <section class="pod-suite-panel">
            <div class="pod-suite-panel-head">
              <h2>
                <span class="pod-suite-title-row">

                <div class="pod-suite-psd-template-group">
                  <select id="podSuitePsdTemplateSelect">
                    <option value="">&#x65B0;&#x5EFA;&#x6A21;&#x677F;</option>
                  </select>
                  <button id="podSuiteLoadPsdTemplateButton" class="pod-suite-secondary-button" type="button" title="&#x8BFB;&#x53D6;&#x5DF2;&#x9009;&#x6A21;&#x677F;&#x7684;&#x8DEF;&#x5F84;&#x548C;&#x5BFC;&#x51FA;&#x8BBE;&#x7F6E;&#x3002;">

              </div>
            </div>
            <div class="pod-suite-psd-config">
              <label class="pod-suite-field pod-suite-psd-wide">
                <span class="pod-suite-field-label">
                  &#x7D20;&#x6750;&#x76EE;&#x5F55;

                </span>
                <div class="pod-suite-picker-row">
                  <input id="podSuitePsdImageDirectoryPath" type="text" readonly />
                  <button id="podSuiteSelectPsdImageDirectoryButton" class="pod-suite-secondary-button" type="button">
                    &#x9009;&#x62E9;
                  </button>
                </div>
              </label>

              <label class="pod-suite-field pod-suite-psd-wide">
                <span class="pod-suite-field-label">
                  &#x5143;&#x6570;&#x636E;&#x6765;&#x6E90;

                </span>
                <div class="pod-suite-picker-row pod-suite-picker-row-preview">

                    &#x9009;&#x56FE;

                  <button id="podSuiteSelectPsdMetadataSourceDirectoryButton" class="pod-suite-secondary-button" type="button">

                  <button id="podSuiteClearPsdMetadataSourceButton" class="pod-suite-secondary-button" type="button" disabled>
                    &#x6E05;&#x7A7A;
                  </button>
                </div>
              </label>

              <div class="pod-suite-psd-mockup-list pod-suite-psd-wide" id="podSuitePsdMockupList"></div>

              <div class="pod-suite-psd-actions pod-suite-psd-wide">
                <button id="podSuiteRunPsdSmartObjectButton" class="pod-suite-primary-button" type="button" disabled>

                <label class="pod-suite-psd-option" title="&#x5F00;&#x542F;&#x540E;&#xFF0C;&#x6BCF;&#x5F20;&#x7D20;&#x6750;&#x5728;&#x66FF;&#x6362;&#x667A;&#x80FD;&#x5BF9;&#x8C61;&#x524D;&#x4F1A;&#x5148;&#x68C0;&#x67E5;&#x5BFC;&#x51FA;&#x7ED3;&#x679C;&#x662F;&#x5426;&#x5DF2;&#x5B58;&#x5728;&#xFF0C;&#x5DF2;&#x5B58;&#x5728;&#x5C31;&#x76F4;&#x63A5;&#x8DF3;&#x8FC7;&#x3002;">

                <label class="pod-suite-engine-mode">

                    <option value="1">&#x5355;&#x7EBF;&#x7A0B;&#x987A;&#x5E8F;&#x6267;&#x884C;</option>
                    <option value="2" selected>&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;1</option>
                    <option value="3">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;2</option>
                    <option value="4">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;3</option>
                    <option value="5">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;4</option>
                    <option value="6">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;5</option>
                    <option value="8">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;7</option>
                    <option value="12">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;11</option>
                    <option value="16">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;15</option>
                    <option value="24">&#x6837;&#x673A;&#x6570;&#x5E76;&#x53D1;&#x00D7;23</option>
                  </select>
                </label>
                <span id="podSuitePsdCompactSummary" class="pod-suite-psd-compact-summary" aria-live="polite"></span>

            </div>

          <section class="pod-suite-panel pod-suite-log-panel">
            <div class="pod-suite-panel-head">
              <h2>PSD&#x6267;&#x884C;&#x65E5;&#x5FD7;</h2>

            <div id="podSuitePsdLog" class="pod-suite-log"></div>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
