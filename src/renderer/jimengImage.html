<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#x5373;&#x68A6;&#x751F;&#x56FE;</title>
    <link rel="stylesheet" href="./jimengImage.css" />
    <script src="./themeSync.js" defer></script>
    <script src="./jimengImage.js" defer></script>
  </head>
  <body>
    <main class="jimeng-shell">
      <section class="jimeng-topbar">
        <div>
          <p class="jimeng-topbar-tag">&#x521B;&#x4F5C;&#x5DE5;&#x4F5C;&#x53F0;</p>
          <h1 class="jimeng-topbar-title">&#x5373;&#x68A6;&#x751F;&#x56FE;</h1>
        </div>
        <div class="jimeng-topbar-actions">
          <span id="jimengBrowserStatusBadge" class="jimeng-status-badge">&#x52A0;&#x8F7D;&#x4E2D;</span>
          <button id="jimengGoHomeButton" class="jimeng-secondary-button" type="button">
            &#x56DE;&#x5230;&#x9996;&#x9875;
          </button>
          <button id="jimengReloadButton" class="jimeng-secondary-button" type="button">
            &#x5237;&#x65B0;
          </button>
          <button id="jimengOpenExternalButton" class="jimeng-primary-button" type="button">
            &#x5916;&#x90E8;&#x6253;&#x5F00;
          </button>
        </div>
      </section>

      <section class="jimeng-workspace">
        <section class="jimeng-browser-panel">
          <header class="jimeng-panel-head">
            <div>
              <p class="jimeng-panel-tag">&#x6D4F;&#x89C8;&#x5668;</p>
              <h2 class="jimeng-panel-title">&#x5373;&#x68A6;&#x5DE5;&#x4F5C;&#x533A;</h2>
            </div>
          </header>

          <div id="jimengBrowserHost" class="jimeng-browser-host"></div>
        </section>

        <aside class="jimeng-settings-panel">
          <section class="jimeng-settings-card">
            <div class="jimeng-settings-card-head">
              <p class="jimeng-panel-tag">&#x6A21;&#x5F0F;</p>
              <h2 class="jimeng-panel-title">&#x751F;&#x6210;&#x6A21;&#x5F0F;</h2>
            </div>
            <div class="jimeng-segmented-control" role="radiogroup" aria-label="Generation Mode">
              <label class="jimeng-segmented-option">
                <input id="jimengModeTextToImage" type="radio" name="jimengMode" value="text-to-image" checked />
                <span>&#x6587;&#x751F;&#x56FE;</span>
              </label>
              <label class="jimeng-segmented-option">
                <input id="jimengModeImageToImage" type="radio" name="jimengMode" value="image-to-image" />
                <span>&#x56FE;&#x751F;&#x56FE;</span>
              </label>
            </div>
          </section>

          <section class="jimeng-settings-card">
            <div class="jimeng-settings-card-head">
              <p id="jimengModeContentTag" class="jimeng-panel-tag">&#x6279;&#x91CF;</p>
              <h2 id="jimengModeContentTitle" class="jimeng-panel-title">&#x63D0;&#x793A;&#x8BCD;&#x6574;&#x7406;</h2>
            </div>
            <div id="jimengPromptBatchSection">
              <label class="jimeng-field">
                <span class="jimeng-field-head">
                  <span class="jimeng-field-label">&#x6279;&#x91CF;&#x63D0;&#x793A;&#x8BCD;&#x8BB0;&#x5F55;</span>
                  <span id="jimengPromptCountHint" class="jimeng-field-hint">&#x5171; 0 &#x6761;</span>
                </span>
                <textarea
                  id="jimengPromptInput"
                  class="jimeng-field-control jimeng-textarea jimeng-batch-textarea"
                  rows="10"
                  placeholder="&#x6309;&#x884C;&#x8BB0;&#x5F55;&#x6279;&#x91CF;&#x6587;&#x751F;&#x56FE;&#x63D0;&#x793A;&#x8BCD;&#xFF0C;&#x4E00;&#x884C;&#x4E00;&#x7EC4;&#xFF0C;&#x4FBF;&#x4E8E;&#x6574;&#x7406;&#x3001;&#x590D;&#x5236;&#x548C;&#x6279;&#x91CF;&#x5904;&#x7406;&#x3002;"
                ></textarea>
                <span id="jimengPromptCountSummary" class="jimeng-field-tip">&#x6309;&#x884C;&#x8BB0;&#x5F55;&#x63D0;&#x793A;&#x8BCD;&#xFF0C;&#x4E00;&#x884C;&#x4E00;&#x7EC4;&#x3002;</span>
              </label>
            </div>
            <div id="jimengImageImportSection" class="jimeng-upload-panel" hidden>
              <input id="jimengImageImportInput" type="file" accept="image/*" multiple hidden />
              <div class="jimeng-upload-actions">
                <label for="jimengImageImportInput" class="jimeng-secondary-button jimeng-upload-button">
                  &#x9009;&#x62E9;&#x56FE;&#x7247;
                </label>
                <button id="jimengClearImportedImagesButton" class="jimeng-secondary-button jimeng-inline-button" type="button">
                  &#x6E05;&#x7A7A;&#x5DF2;&#x9009;
                </button>
              </div>
              <p class="jimeng-upload-tip">
                &#x56FE;&#x751F;&#x56FE;&#x6A21;&#x5F0F;&#x4E0B;&#x53EF;&#x4E00;&#x6B21;&#x5BFC;&#x5165;&#x591A;&#x5F20;&#x56FE;&#x7247;&#xFF0C;&#x7528;&#x4E8E;&#x6279;&#x91CF;&#x6574;&#x7406;&#x548C;&#x540E;&#x7EED;&#x6267;&#x884C;&#x3002;
              </p>
              <div id="jimengImportedImageSummary" class="jimeng-upload-summary"></div>
              <div id="jimengImportedImageList" class="jimeng-upload-list"></div>
            </div>
          </section>

          <section class="jimeng-settings-card">
            <div class="jimeng-settings-card-head">
              <p class="jimeng-panel-tag">&#x63D0;&#x793A;</p>
              <h2 class="jimeng-panel-title">&#x63D0;&#x793A;&#x8BCD;&#x524D;&#x7F00; / &#x540E;&#x7F00;</h2>
            </div>
            <div class="jimeng-prefix-grid">
              <label class="jimeng-field">
                <span class="jimeng-field-label">&#x63D0;&#x793A;&#x8BCD;&#x524D;&#x7F00;</span>
                <textarea
                  id="jimengPromptPrefixInput"
                  class="jimeng-field-control jimeng-textarea"
                  rows="4"
                  placeholder="&#x7528;&#x4E8E;&#x6BCF;&#x7EC4;&#x63D0;&#x793A;&#x8BCD;&#x524D;&#x9762;&#x7EDF;&#x4E00;&#x8865;&#x5145;&#x7684;&#x63CF;&#x8FF0;&#x5185;&#x5BB9;&#x3002;"
                ></textarea>
              </label>
              <label class="jimeng-field">
                <span class="jimeng-field-label">&#x63D0;&#x793A;&#x8BCD;&#x540E;&#x7F00;</span>
                <textarea
                  id="jimengPromptSuffixInput"
                  class="jimeng-field-control jimeng-textarea"
                  rows="4"
                  placeholder="&#x7528;&#x4E8E;&#x6BCF;&#x7EC4;&#x63D0;&#x793A;&#x8BCD;&#x540E;&#x9762;&#x7EDF;&#x4E00;&#x8865;&#x5145;&#x7684;&#x98CE;&#x683C;&#x3001;&#x7EC6;&#x8282;&#x6216;&#x8D28;&#x611F;&#x63CF;&#x8FF0;&#x3002;"
                ></textarea>
              </label>
            </div>
          </section>

          <section class="jimeng-settings-card jimeng-run-card">
            <div class="jimeng-settings-card-head jimeng-settings-card-head-inline">
              <div>
                <p class="jimeng-panel-tag">&#x6267;&#x884C;</p>
                <h2 class="jimeng-panel-title">&#x6279;&#x91CF;&#x4EFB;&#x52A1;</h2>
              </div>
              <button id="jimengClearLogButton" class="jimeng-secondary-button jimeng-inline-button" type="button">
                &#x6E05;&#x7A7A;&#x65E5;&#x5FD7;
              </button>
            </div>
            <div class="jimeng-run-config-grid">
              <div class="jimeng-run-config-panel">
                <div class="jimeng-field-grid jimeng-field-grid-compact">
                  <label class="jimeng-check-row">
                    <input id="jimengCreateDateSubdirectoryInput" type="checkbox" />
                    <span class="jimeng-check-label">&#x521B;&#x5EFA;&#x65E5;&#x671F;</span>
                  </label>
                  <label class="jimeng-check-row">
                    <input id="jimengFilterDuplicateTasksInput" type="checkbox" />
                    <span class="jimeng-check-label">&#x8FC7;&#x6EE4;&#x91CD;&#x590D;&#x63D0;&#x793A;/&#x56FE;&#x7247;</span>
                  </label>
                </div>
                <div class="jimeng-run-setting-grid">
                  <label class="jimeng-field jimeng-inline-field jimeng-run-setting-card">
                    <span class="jimeng-field-label">&#x961F;&#x5217;&#x4EFB;&#x52A1;&#x4E0A;&#x9650;</span>
                    <input
                      id="jimengQueueTaskLimitInput"
                      class="jimeng-field-control jimeng-queue-limit-input"
                      type="number"
                      min="1"
                      max="10"
                      step="1"
                      value="1"
                      placeholder="1-10"
                    />
                    <span class="jimeng-field-tip">&#x53EF;&#x540C;&#x65F6;&#x6392;&#x961F;&#x7684;&#x63D0;&#x793A;&#x8BCD;&#x6761;&#x6570;&#x3002;</span>
                  </label>
                  <label class="jimeng-field jimeng-inline-field jimeng-run-setting-card">
                    <span class="jimeng-field-label">&#x8D77;&#x59CB;&#x6570;&#x91CF;</span>
                    <input
                      id="jimengStartTaskOffsetInput"
                      class="jimeng-field-control jimeng-queue-limit-input"
                      type="number"
                      min="0"
                      step="1"
                      value="0"
                      placeholder="0"
                    />
                    <span class="jimeng-field-tip">&#x6267;&#x884C;&#x65F6;&#x5148;&#x8DF3;&#x8FC7;&#x524D;&#x9762;&#x7684;&#x8BB0;&#x5F55;&#x6570;&#x91CF;&#x3002;</span>
                  </label>
                </div>
                <label class="jimeng-field">
                  <span class="jimeng-field-label">&#x4FDD;&#x5B58;&#x76EE;&#x5F55;&#x8BBE;&#x7F6E;</span>
                  <div class="jimeng-directory-row">
                    <div id="jimengSaveDirectoryValue" class="jimeng-directory-value"></div>
                    <button id="jimengSelectSaveDirectoryButton" class="jimeng-secondary-button jimeng-inline-button" type="button">
                      &#x9009;&#x62E9;&#x76EE;&#x5F55;
                    </button>
                  </div>
                </label>
              </div>
              <div class="jimeng-run-status-panel">
                <div class="jimeng-batch-state-row">
                  <span id="jimengBatchStateBadge" class="jimeng-batch-state-badge is-idle">&#x7A7A;&#x95F2;</span>
                  <span id="jimengBatchStateSummary" class="jimeng-batch-state-summary">&#x6682;&#x65E0;&#x5728;&#x8FD0;&#x884C;&#x7684;&#x6279;&#x91CF;&#x4EFB;&#x52A1;</span>
                </div>
                <div class="jimeng-batch-action-row">
                  <button id="jimengBatchGenerateButton" class="jimeng-primary-button jimeng-batch-generate-button" type="button">
                    &#x6279;&#x91CF;&#x751F;&#x6210;
                  </button>
                  <button id="jimengBatchPauseButton" class="jimeng-secondary-button jimeng-inline-button" type="button">
                    &#x6682;&#x505C;
                  </button>
                  <button id="jimengBatchResumeButton" class="jimeng-secondary-button jimeng-inline-button" type="button">
                    &#x7EE7;&#x7EED;
                  </button>
                  <button id="jimengBatchStopButton" class="jimeng-secondary-button jimeng-inline-button" type="button">
                    &#x505C;&#x6B62;
                  </button>
                </div>
              </div>
            </div>
            <div class="jimeng-run-log-shell">
              <div class="jimeng-run-log-head">
                <span class="jimeng-field-label">&#x8FD0;&#x884C;&#x65E5;&#x5FD7;</span>
              </div>
              <div id="jimengRunLogList" class="jimeng-run-log"></div>
            </div>
          </section>
        </aside>
      </section>
    </main>
  </body>
</html>
